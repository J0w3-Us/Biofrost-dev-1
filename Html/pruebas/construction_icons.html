<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iconografía de Construcción</title>
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 3.5rem;
            margin-bottom: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .icons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .icon:hover {
            background: rgba(102, 126, 234, 0.1);
            transform: translateY(-5px);
        }

        .icon svg {
            width: 48px;
            height: 48px;
            stroke: #333;
            stroke-width: 2;
            fill: none;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .icon:hover svg {
            stroke: #667eea;
            transform: scale(1.1);
        }

        .icon-name {
            font-size: 12px;
            color: #666;
            text-align: center;
            font-weight: 500;
        }

        .section-title {
            font-size: 1.5rem;
            color: #333;
            margin: 40px 0 20px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Iconografía de Construcción</h1>
        
        <div class="section-title">Herramientas</div>
        <div class="icons-grid">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                </svg>
                <span class="icon-name">Martillo</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
                </svg>
                <span class="icon-name">Destornillador</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/>
                    <line x1="16" y1="8" x2="2" y2="22"/>
                    <line x1="17.5" y1="15" x2="9" y2="15"/>
                </svg>
                <span class="icon-name">Taladro</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10,17 15,12 10,7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                <span class="icon-name">Llave inglesa</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <line x1="4" y1="21" x2="4" y2="14"/>
                    <line x1="4" y1="10" x2="4" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="12"/>
                    <line x1="12" y1="8" x2="12" y2="3"/>
                    <line x1="20" y1="21" x2="20" y2="16"/>
                    <line x1="20" y1="12" x2="20" y2="3"/>
                    <line x1="1" y1="14" x2="7" y2="14"/>
                    <line x1="9" y1="8" x2="15" y2="8"/>
                    <line x1="17" y1="16" x2="23" y2="16"/>
                </svg>
                <span class="icon-name">Nivel</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/>
                </svg>
                <span class="icon-name">Sierra</span>
            </div>
        </div>

        <div class="section-title">Materiales</div>
        <div class="icons-grid">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                <span class="icon-name">Ladrillo</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    <polyline points="3.27,6.96 12,12.01 20.73,6.96"/>
                    <line x1="12" y1="22.08" x2="12" y2="12"/>
                </svg>
                <span class="icon-name">Cemento</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2z"/>
                    <line x1="8" y1="3" x2="8" y2="7"/>
                    <line x1="16" y1="3" x2="16" y2="7"/>
                </svg>
                <span class="icon-name">Vigas</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <span class="icon-name">Tuberías</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <rect x="4" y="4" width="16" height="16" rx="2"/>
                    <rect x="9" y="9" width="6" height="6"/>
                    <line x1="9" y1="1" x2="15" y2="1"/>
                    <line x1="9" y1="23" x2="15" y2="23"/>
                    <line x1="1" y1="9" x2="1" y2="15"/>
                    <line x1="23" y1="9" x2="23" y2="15"/>
                </svg>
                <span class="icon-name">Cables</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 0 1-8 0"/>
                </svg>
                <span class="icon-name">Pintura</span>
            </div>
        </div>

        <div class="section-title">Equipos y Maquinaria</div>
        <div class="icons-grid">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M8 6h13l-4 7-4.03-7"/>
                    <path d="M6.83 8L10 14L8 6"/>
                    <path d="M4.83 5L8 11L6 5"/>
                    <circle cx="18" cy="18" r="4"/>
                    <circle cx="6" cy="18" r="4"/>
                </svg>
                <span class="icon-name">Excavadora</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <rect x="1" y="3" width="15" height="13"/>
                    <polygon points="16,8 20,8 23,11 23,16 18,16 18,11 16,11"/>
                    <circle cx="5.5" cy="18.5" r="2.5"/>
                    <circle cx="18.5" cy="18.5" r="2.5"/>
                </svg>
                <span class="icon-name">Camión</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="2"/>
                    <path d="M16.24 7.76a6 6 0 0 1 0 8.49m-8.48-.01a6 6 0 0 1 0-8.49m11.31-2.82a10 10 0 0 1 0 14.14m-14.14 0a10 10 0 0 1 0-14.14"/>
                </svg>
                <span class="icon-name">Mezcladora</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M3 21h18"/>
                    <path d="M5 21V7l8-4v18"/>
                    <path d="M19 21V11l-6-4"/>
                </svg>
                <span class="icon-name">Grúa</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M2 20h20"/>
                    <path d="M7 20v-4"/>
                    <path d="M12 20v-6"/>
                    <path d="M17 20v-8"/>
                    <path d="M22 4L2 4"/>
                </svg>
                <span class="icon-name">Andamio</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
                    <line x1="12" y1="22" x2="12" y2="15.5"/>
                    <polyline points="7,6.5 12,9.5 17,6.5"/>
                </svg>
                <span class="icon-name">Casco</span>
            </div>
        </div>

        <div class="section-title">Medición y Planeación</div>
        <div class="icons-grid">
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14,2 14,8 20,8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10,9 9,9 8,9"/>
                </svg>
                <span class="icon-name">Planos</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M21 7.5l-2.25-1.313M21 7.5v9l-2.25 1.313M21 7.5l-2.25 1.313m0-3.625L16.5 6.5l-2.25-1.313M18.75 5.187l-2.25-1.313L14.25 5.187m0 3.625L16.5 10.125l2.25-1.313M14.25 8.812L12 7.5l-2.25 1.313M12 7.5v9l-2.25 1.313M12 7.5l2.25 1.313m-4.5 7.875L5.25 15.375 3 16.688m2.25-1.313L3 7.5l2.25-1.313M5.25 15.375l2.25 1.313L9.75 15.375"/>
                </svg>
                <span class="icon-name">Metro</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12,6 12,12 16,14"/>
                </svg>
                <span class="icon-name">Cronómetro</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <polygon points="5,3 19,12 5,21"/>
                </svg>
                <span class="icon-name">Compás</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M3 3l18 18"/>
                    <path d="M14.5 9.5c-.5-.5-1.2-.5-1.7 0L9.5 12.8c-.5.5-.5 1.2 0 1.7s1.2.5 1.7 0l3.3-3.3c.5-.5.5-1.2 0-1.7z"/>
                    <path d="M21 14.5c-.5-.5-1.2-.5-1.7 0L16 17.8c-.5.5-.5 1.2 0 1.7s1.2.5 1.7 0l3.3-3.3c.5-.5.5-1.2 0-1.7z"/>
                </svg>
                <span class="icon-name">Escuadra</span>
            </div>
            
            <div class="icon">
                <svg viewBox="0 0 24 24">
                    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                    <circle cx="12" cy="12" r="4"/>
                </svg>
                <span class="icon-name">Teodolito</span>
            </div>
        </div>
    </div>
</body>
</html>
