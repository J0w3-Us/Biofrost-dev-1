<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector de Color</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos personalizados para el efecto de sombra y borde de los círculos de color */
        .color-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%; /* Hace el elemento circular */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer; /* Cambia el cursor a una mano al pasar por encima */
            transition: all 0.2s ease-in-out; /* Suave transición para efectos de hover y selección */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Sombra suave por defecto */
            border: 2px solid transparent; /* Borde transparente por defecto */
        }

        /* Estilo para el círculo de color cuando está seleccionado */
        .color-circle.selected {
            border-color: #BCBCBC; /* Borde gris claro cuando está seleccionado */
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2); /* Sombra más pronunciada al seleccionar */
            transform: translateY(-2px); /* Ligero levantamiento al seleccionar */
        }

        /* Estilo para el círculo de color al pasar el ratón por encima */
        .color-circle:hover {
            transform: translateY(-2px); /* Ligero levantamiento al pasar el ratón */
            box-shadow: 0 6px 10px rgba(0, 0, 0, 0.15); /* Sombra al pasar el ratón */
        }

        /* Estilo para el texto del código hexadecimal */
        .hex-code {
            font-family: 'Inter', sans-serif; /* Fuente Inter para el texto */
            font-size: 0.9rem; /* Tamaño de fuente más pequeño */
            color: #2D2D2D; /* Color de texto oscuro por defecto */
            margin-top: 8px; /* Margen superior para separar del círculo */
            text-align: center; /* Centra el texto */
            /* Estilos para el span editable */
            cursor: text; /* Cambia el cursor a texto para indicar editabilidad */
            padding: 2px 5px; /* Pequeño padding para mejor interacción */
            border-bottom: 1px dashed #BCBCBC; /* Borde inferior para indicar que es editable */
            min-width: 80px; /* Ancho mínimo para que sea fácil de editar */
            display: inline-block; /* Para que padding y min-width funcionen */
        }

        .hex-code:focus {
            outline: none; /* Quita el contorno por defecto al enfocar */
            border-bottom: 1px solid #755EFF; /* Borde azul al enfocar */
        }

        /* Estilos para el botón de eliminar */
        .delete-color-btn {
            position: absolute;
            top: -8px; /* Ajusta la posición vertical */
            right: -8px; /* Ajusta la posición horizontal */
            background-color: #ef4444; /* Rojo */
            color: white;
            border-radius: 9999px; /* Completamente redondo */
            width: 24px; /* Ancho */
            height: 24px; /* Altura */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem; /* Tamaño de fuente pequeño */
            font-weight: bold;
            opacity: 0; /* Oculto por defecto */
            transition: opacity 0.2s ease-in-out; /* Transición suave */
            cursor: pointer;
            border: none; /* Sin borde */
            z-index: 10; /* Asegura que esté por encima del círculo de color */
        }

        /* Mostrar el botón de eliminar al pasar el ratón sobre el contenedor del color */
        .color-item-wrapper:hover .delete-color-btn {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="bg-white p-8 rounded-xl shadow-lg flex flex-col items-center space-y-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">Selecciona un Color</h1>

        <div id="color-circles-container" class="flex flex-wrap justify-center gap-8">
            <div class="flex flex-col items-center color-item-wrapper relative group">
                <div id="color-002F6C" class="color-circle bg-[#002F6C]" data-color="#002F6C"></div>
                <span class="hex-code text-[#002F6C]">#002F6C</span>
                <button class="delete-color-btn" data-target-id="color-002F6C">&times;</button>
            </div>

            <div class="flex flex-col items-center color-item-wrapper relative group">
                <div id="color-4B4B4B" class="color-circle bg-[#4B4B4B]" data-color="#4B4B4B"></div>
                <span class="hex-code text-[#4B4B4B]">#4B4B4B</span>
                <button class="delete-color-btn" data-target-id="color-4B4B4B">&times;</button>
            </div>

            <div class="flex flex-col items-center color-item-wrapper relative group">
                <div id="color-FFFFFF" class="color-circle bg-[#FFFFFF] border border-gray-300" data-color="#FFFFFF"></div>
                <span class="hex-code text-[#BCBCBC]">#FFFFFF</span>
                <button class="delete-color-btn" data-target-id="color-FFFFFF">&times;</button>
            </div>

            <div class="flex flex-col items-center color-item-wrapper relative group">
                <div id="color-F2C94C" class="color-circle bg-[#F2C94C]" data-color="#F2C94C"></div>
                <span class="hex-code text-[#F2C94C]">#F2C94C</span>
                <button class="delete-color-btn" data-target-id="color-F2C94C">&times;</button>
            </div>
        </div>

        <div class="mt-8 p-4 bg-gray-200 rounded-lg w-full max-w-xs text-center flex flex-col items-center space-y-4">
            <h2 class="text-xl font-bold text-gray-800">Añadir Nuevo Color</h2>
            <div class="flex items-center space-x-4">
                <input type="text" id="new-color-input" placeholder="#RRGGBB" maxlength="7" class="p-2 border border-gray-300 rounded-md text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button id="add-new-color-button" class="px-6 py-2 bg-green-600 text-white font-semibold rounded-lg shadow-md hover:bg-green-700 transition duration-200 ease-in-out">
                    Añadir Color
                </button>
            </div>
            <p id="add-color-message" class="text-sm text-red-500 hidden"></p>
        </div>

        <div class="mt-8 p-4 bg-gray-200 rounded-lg w-full max-w-xs text-center">
            <p class="text-gray-700 font-semibold">Color seleccionado:</p>
            <div id="selected-color-display" class="w-24 h-24 mx-auto mt-2 rounded-lg border-2 border-gray-400" style="background-color: transparent;"></div>
            <p id="selected-color-code" class="hex-code mt-2 text-lg font-bold" contenteditable="true">Ninguno</p>
        </div>
    </div>

    <script>
        // Obtener el contenedor principal de los círculos de color
        const colorCirclesContainer = document.getElementById('color-circles-container');
        // Obtener el elemento div donde se mostrará el color seleccionado
        const selectedColorDisplay = document.getElementById('selected-color-display');
        // Obtener el elemento p donde se mostrará el código hexadecimal del color seleccionado, ahora editable
        const selectedColorCode = document.getElementById('selected-color-code');

        // Obtener los elementos para añadir nuevos colores
        const newColorInput = document.getElementById('new-color-input');
        const addNewColorButton = document.getElementById('add-new-color-button');
        const addColorMessage = document.getElementById('add-color-message');

        /**
         * Función para actualizar el display del color seleccionado.
         * @param {string} color - El código hexadecimal del color a mostrar.
         */
        function updateSelectedColorDisplay(color) {
            selectedColorDisplay.style.backgroundColor = color;
            selectedColorCode.textContent = color;
            selectedColorCode.style.color = color;
        }

        /**
         * Valida si una cadena es un código hexadecimal de color válido.
         * @param {string} color - La cadena a validar.
         * @returns {boolean} - True si es un color hexadecimal válido, false en caso contrario.
         */
        function isValidHexColor(color) {
            const hexRegex = /^#([0-9A-F]{3}){1,2}$/i; // Permite #RGB y #RRGGBB
            return hexRegex.test(color);
        }

        /**
         * Crea y devuelve un nuevo elemento de círculo de color con su texto hexadecimal y botón de eliminar.
         * También adjunta los event listeners de clic y eliminar al nuevo círculo.
         * @param {string} color - El código hexadecimal del color.
         * @returns {HTMLElement} El div que contiene el círculo de color, el span de texto y el botón de eliminar.
         */
        function createColorCircleElement(color) {
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = 'flex flex-col items-center color-item-wrapper relative group'; // Añadido 'color-item-wrapper' y 'group'

            const colorCircleDiv = document.createElement('div');
            colorCircleDiv.id = `color-${color.substring(1)}`;
            colorCircleDiv.className = `color-circle bg-[${color}]`;
            colorCircleDiv.dataset.color = color;

            // Añadir borde para colores muy claros como el blanco, o si el color es muy similar al fondo
            if (color.toUpperCase() === '#FFFFFF' || color.toUpperCase() === '#F8F8F8' || color.toUpperCase() === '#EEEEEE') {
                colorCircleDiv.classList.add('border', 'border-gray-300');
            }

            const hexCodeSpan = document.createElement('span');
            hexCodeSpan.className = `hex-code text-[${color}]`;
            hexCodeSpan.textContent = color;

            const deleteButton = document.createElement('button');
            deleteButton.className = 'delete-color-btn';
            deleteButton.textContent = '×'; // Símbolo de multiplicación para la 'X'
            deleteButton.dataset.targetId = colorCircleDiv.id; // Para identificar qué elemento eliminar

            // Event listener para eliminar el color
            deleteButton.addEventListener('click', (event) => {
                event.stopPropagation(); // Evita que el clic en el botón de eliminar también seleccione el color
                const targetId = event.target.dataset.targetId;
                const elementToRemove = document.getElementById(targetId).closest('.color-item-wrapper');
                if (elementToRemove) {
                    // Si el color eliminado era el seleccionado, resetear el display
                    if (selectedColorDisplay.style.backgroundColor.toUpperCase() === color.toUpperCase()) {
                        updateSelectedColorDisplay('Ninguno');
                    }
                    elementToRemove.remove();
                }
            });

            wrapperDiv.appendChild(colorCircleDiv);
            wrapperDiv.appendChild(hexCodeSpan);
            wrapperDiv.appendChild(deleteButton); // Añadir el botón de eliminar al wrapper

            // Adjuntar el event listener de clic al nuevo círculo
            colorCircleDiv.addEventListener('click', () => {
                // Remover la clase 'selected' de todos los círculos existentes
                document.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
                // Añadir la clase 'selected' al círculo clickeado
                colorCircleDiv.classList.add('selected');
                // Actualizar el display del color seleccionado
                updateSelectedColorDisplay(color);
            });

            return wrapperDiv;
        }

        // Función para inicializar los event listeners de los círculos de color predefinidos
        function initializeColorCircles() {
            document.querySelectorAll('.color-circle').forEach(circle => {
                // Asegurarse de que no haya múltiples listeners si la función se llama varias veces
                circle.removeEventListener('click', handleColorCircleClick);
                circle.addEventListener('click', handleColorCircleClick);
            });

            document.querySelectorAll('.delete-color-btn').forEach(button => {
                button.removeEventListener('click', handleDeleteButtonClick);
                button.addEventListener('click', handleDeleteButtonClick);
            });
        }

        // Manejador de clic para los círculos de color
        function handleColorCircleClick(event) {
            const circle = event.currentTarget;
            document.querySelectorAll('.color-circle').forEach(c => c.classList.remove('selected'));
            circle.classList.add('selected');
            updateSelectedColorDisplay(circle.dataset.color);
        }

        // Manejador de clic para los botones de eliminar
        function handleDeleteButtonClick(event) {
            event.stopPropagation(); // Evita que el clic en el botón de eliminar también seleccione el color
            const targetId = event.target.dataset.targetId;
            const elementToRemove = document.getElementById(targetId).closest('.color-item-wrapper');
            if (elementToRemove) {
                const deletedColor = document.getElementById(targetId).dataset.color;
                // Si el color eliminado era el seleccionado, resetear el display
                if (selectedColorDisplay.style.backgroundColor.toUpperCase() === deletedColor.toUpperCase()) {
                    updateSelectedColorDisplay('Ninguno');
                }
                elementToRemove.remove();
            }
        }


        // Event listener para el botón "Añadir Color"
        addNewColorButton.addEventListener('click', () => {
            let newColor = newColorInput.value.trim().toUpperCase();

            // Asegurarse de que el valor comience con '#' si no está vacío
            if (!newColor.startsWith('#') && newColor.length > 0) {
                newColor = '#' + newColor;
            }

            if (isValidHexColor(newColor)) {
                // Ocultar cualquier mensaje de error anterior
                addColorMessage.classList.add('hidden');

                const newColorElement = createColorCircleElement(newColor);
                colorCirclesContainer.appendChild(newColorElement);
                newColorInput.value = ''; // Limpiar el input después de añadir el color

                // Opcional: seleccionar el nuevo color automáticamente después de añadirlo
                // newColorElement.querySelector('.color-circle').click();

            } else {
                addColorMessage.textContent = "Formato de color hexadecimal inválido. Use #RRGGBB o #RGB.";
                addColorMessage.classList.remove('hidden');
            }
        });

        // Event listener para el input del texto hexadecimal editable (para el color seleccionado)
        selectedColorCode.addEventListener('input', () => {
            let color = selectedColorCode.textContent.trim().toUpperCase();

            // Asegurarse de que el valor comience con '#' si no está vacío
            if (!color.startsWith('#') && color.length > 0) {
                color = '#' + color;
            }

            // Validar y actualizar si es un color hexadecimal válido
            if (isValidHexColor(color)) {
                selectedColorDisplay.style.backgroundColor = color;
                selectedColorCode.style.color = color;
            } else {
                // Si el color no es válido, mantener el fondo transparente y el texto oscuro
                selectedColorDisplay.style.backgroundColor = 'transparent';
                selectedColorCode.style.color = '#2D2D2D'; // Color de texto por defecto para indicar error o no válido
            }
        });

        // Opcional: Event listener para cuando el usuario deja de editar el span
        selectedColorCode.addEventListener('blur', () => {
            let color = selectedColorCode.textContent.trim().toUpperCase();
            // Si al salir del foco el valor no es válido, resetearlo o mostrar un mensaje
            if (!isValidHexColor(color)) {
                // Si el usuario deja un valor inválido, lo reseteamos a "Ninguno"
                selectedColorCode.textContent = 'Ninguno';
                selectedColorDisplay.style.backgroundColor = 'transparent';
                selectedColorCode.style.color = '#2D2D2D';
            }
        });

        // Inicializar los event listeners para los círculos de color predefinidos al cargar la página
        initializeColorCircles();
        // Inicializar el display de color al cargar la página
        updateSelectedColorDisplay('Ninguno');
    </script>
</body>
</html>
