<h2 mat-dialog-title>{{ data?.id ? 'Editar usuario' : 'Añadir usuario' }}</h2>
<div mat-dialog-content>
    <form [formGroup]="form" class="usuario-form">
        <mat-form-field appearance="fill" class="full-width">
            <mat-label>Nombre</mat-label>
            <input matInput formControlName="name" placeholder="Nombre completo" />
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" placeholder="correo@ejemplo.com" />
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
            <mat-label>Teléfono</mat-label>
            <input matInput formControlName="phone" placeholder="(555) 555-5555" />
        </mat-form-field>
    </form>
</div>
<div mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancelar</button>
    <button mat-flat-button color="primary" (click)="save()" [disabled]="form.invalid">Guardar</button>
</div>
