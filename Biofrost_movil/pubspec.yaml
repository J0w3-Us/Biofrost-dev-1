name: Biofrost
description: "Aplicación móvil de auditoría y evaluación de proyectos académicos — nueva versión de Biofrost"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.2
  firebase_messaging: ^15.2.10
  cloud_firestore: ^5.4.4

  # HTTP & API
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Estado (Riverpod)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegacion
  go_router: ^14.3.0

  # Modelos & serializacion
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Almacenamiento local
  shared_preferences: ^2.5.4
  sqflite: ^2.4.0
  path: ^1.9.0

  # Conectividad
  connectivity_plus: ^6.1.0

  # UI
  flutter_native_splash: ^2.4.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  lottie: ^3.1.2

  # Notificaciones locales
  flutter_local_notifications: ^20.1.0

  # Utilidades
  intl: ^0.19.0
  logger: ^2.4.0
  url_launcher: ^6.3.1
  share_plus: ^12.0.1
  image_picker: ^1.1.2
  collection: ^1.19.1
  youtube_player_iframe: ^5.2.2
  video_player: ^2.9.2
  chewie: ^1.8.5
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.4.0

flutter_native_splash:
  color: "#0D1117"
  android_12:
    icon_background_color: "#0D1117"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/banner/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/static/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter/static/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/static/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/static/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter/static/Inter_18pt-Italic.ttf
          style: italic
        - asset: assets/fonts/Inter/static/Inter_18pt-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Inter/static/Inter_18pt-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Inter/static/Inter_18pt-BoldItalic.ttf
          weight: 700
          style: italic
