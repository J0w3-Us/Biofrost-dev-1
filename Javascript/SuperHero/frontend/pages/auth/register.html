<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Superhero Battle Arena</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <link rel="stylesheet" href="../../assets/css/retro.css">
    <link rel="stylesheet" href="../../assets/css/components.css">
    <link rel="stylesheet" href="../../assets/css/responsive.css">
</head>
<body>
    <div class="auth-screen retro-border">
        <h1 class="pixel-title">📝 Registro</h1>
        <form id="register-form" class="retro-form">
            <div class="form-group">
                <label for="username" class="pixel-label">Usuario:</label>
                <input type="text" id="username" name="username" class="retro-input" required>
            </div>
            <div class="form-group">
                <label for="password" class="pixel-label">Contraseña:</label>
                <input type="password" id="password" name="password" class="retro-input" required>
            </div>
            <!-- <div class="form-group">
                <label for="confirm-password" class="pixel-label">Confirmar contraseña:</label>
                <input type="password" id="confirm-password" name="confirm-password" class="retro-input" required>
            </div> -->
            <div class="form-actions">
                <button type="submit" class="retro-button primary">Registrarse</button>
            </div>
            <div class="form-actions">
                <p>¿Ya tienes una cuenta?</p><a href="login.html">Iniciar sesión</a>
            </div>
        </form>
        <div id="register-message"></div>
    </div>
    <script src="/assets/js/config.js"></script>
    <script src="/assets/js/utils.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/backend/register.js"></script>
</body>
</html>
